<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Divakar Thammishetti | Flappy Sphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; touch-action: manipulation; }
        canvas { 
            display: block; 
            margin: 0 auto; 
            cursor: pointer;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            touch-action: none;
        }
        .game-container { 
            position: relative; 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto; 
            border-radius: 1.5rem; 
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        #game-overlay { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: rgba(2, 6, 23, 0.85); 
            color: white; 
            flex-direction: column; 
            z-index: 10; 
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-200">

    <nav class="p-6 flex justify-between items-center max-w-4xl mx-auto">
        <span class="text-2xl font-extrabold tracking-tighter text-white">DIVAKAR<span class="text-blue-500">.</span>T</span>
        <a href="https://www.linkedin.com/in/divakar-thammishetti/" target="_blank" class="bg-blue-600 px-5 py-2 rounded-full text-xs font-bold hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">
            <i data-lucide="linkedin" class="w-4 h-4 text-white"></i>
        </a>
    </nav>

    <section class="pt-6 pb-20 px-6">
        <div class="max-w-xl mx-auto text-center mb-6">
            <h1 class="text-4xl font-extrabold text-white mb-2 tracking-tight">Flappy Sphere</h1>
            <p class="text-slate-400 text-sm italic">Avoid the obstacles to reach Production!</p>
        </div>

        <div class="game-container border border-slate-800">
            <div id="game-overlay">
                <div class="bg-blue-500/20 p-4 rounded-2xl mb-4">
                    <i data-lucide="wing" class="w-10 h-10 text-blue-400 animate-pulse"></i>
                </div>
                <h2 class="text-2xl font-black mb-1" id="status-text">TAP TO FLAP</h2>
                <p class="text-slate-400 mb-6 uppercase tracking-widest text-[10px]">Space / Tap to Fly</p>
                <button onclick="startGame()" class="bg-white text-black hover:bg-blue-400 hover:text-white px-8 py-3 rounded-xl font-black transition-all transform hover:scale-105">
                    START SPRINT
                </button>
            </div>
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <div class="max-w-xl mx-auto mt-6 grid grid-cols-2 gap-4">
            <div class="bg-slate-900/50 p-3 rounded-xl text-center border border-slate-800">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Score</p>
                <p id="current-score" class="text-2xl font-black text-blue-400">0</p>
            </div>
            <div class="bg-slate-900/50 p-3 rounded-xl text-center border border-slate-800">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Best Run</p>
                <p id="high-score" class="text-2xl font-black text-purple-400">0</p>
            </div>
        </div>
    </section>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('game-overlay');
        const statusText = document.getElementById('status-text');
        const scoreEl = document.getElementById('current-score');
        const highScoreEl = document.getElementById('high-score');

        canvas.width = 400;
        canvas.height = 500;

        const faceImg = new Image();
        faceImg.src = 'https://media.licdn.com/dms/image/v2/D4D03AQFbW0xvY4Cq8g/profile-displayphoto-shrink_200_200/profile-displayphoto-shrink_200_200/0/1731470126996?e=1778112000&v=beta&t=zNhC6agIMRZv_sUUVQSuPickFpPpmR9tC_Ldak5fel4'; 

        const GRAVITY = 0.28;
        const FLAP_STRENGTH = -5.5;
        const PIPE_SPEED = 2.5;
        const PIPE_SPAWN_RATE = 95; 
        const PIPE_GAP = 160;
        const PIPE_WIDTH = 70; // Slightly wider for text

        let bird = { x: 50, y: 250, radius: 22, dy: 0, rotation: 0, flapFrame: 0 };
        let pipes = [];
        let score = 0;
        let highScore = 0;
        let gameActive = false;
        let frame = 0;

        const obstacleLabels = ["BUGS", "F5", "INTERNS", "G-FACTOR", "BKL"];

        function startGame() {
            score = 0; scoreEl.innerText = "0";
            pipes = []; bird.y = 250; bird.dy = 0;
            gameActive = true; overlay.style.display = 'none';
            frame = 0; requestAnimationFrame(animate);
        }

        function flap() { if (gameActive) { bird.dy = FLAP_STRENGTH; bird.flapFrame = 1; } }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
        canvas.addEventListener('mousedown', flap);
        canvas.addEventListener('touchstart', (e) => { if(gameActive) { e.preventDefault(); flap(); } }, { passive: false });

        function spawnPipe() {
            const minHeight = 60;
            const maxHeight = canvas.height - PIPE_GAP - minHeight;
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            const label = obstacleLabels[Math.floor(Math.random() * obstacleLabels.length)];
            pipes.push({ x: canvas.width, topHeight, label, passed: false });
        }

        function drawBird(ctx, b, faceImg) {
            ctx.save();
            ctx.translate(b.x + b.radius, b.y + b.radius);
            b.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, b.dy * 0.1));
            ctx.rotate(b.rotation);

            // Wings
            ctx.fillStyle = '#f8fafc'; ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1;
            if (b.flapFrame > 0 && b.flapFrame < 8) b.flapFrame++; else b.flapFrame = 0;
            const wingY = (b.flapFrame > 0 && b.flapFrame < 4) ? -12 : 6;

            ctx.beginPath(); ctx.moveTo(-b.radius, 0); ctx.lineTo(-b.radius-20, wingY); ctx.lineTo(-b.radius-15, wingY+15); ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(b.radius, 0); ctx.lineTo(b.radius+20, wingY); ctx.lineTo(b.radius+15, wingY+15); ctx.fill(); ctx.stroke();

            // Sphere
            ctx.save();
            ctx.beginPath(); ctx.arc(0, 0, b.radius, 0, Math.PI * 2); ctx.clip();
            ctx.fillStyle = '#3b82f6'; ctx.fill();
            if (faceImg.complete) ctx.drawImage(faceImg, -b.radius, -b.radius, b.radius*2, b.radius*2);
            ctx.restore();

            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, 0, b.radius, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();
        }

        function animate() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            bird.dy += GRAVITY;
            bird.y += bird.dy;

            if (bird.y + bird.radius*2 > canvas.height || bird.y < 0) gameOver();

            drawBird(ctx, bird, faceImg);

            if (frame % PIPE_SPAWN_RATE === 0) spawnPipe();

            pipes.forEach((p, index) => {
                p.x -= PIPE_SPEED;
                const bottomY = p.topHeight + PIPE_GAP;
                const bottomHeight = canvas.height - bottomY;

                // Draw Pipes
                ctx.fillStyle = '#1e293b'; ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3;
                ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topHeight); ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.topHeight);
                ctx.fillRect(p.x, bottomY, PIPE_WIDTH, bottomHeight); ctx.strokeRect(p.x, bottomY, PIPE_WIDTH, bottomHeight);

                // Draw Text on Pillars
                ctx.save();
                ctx.fillStyle = 'rgba(239, 68, 68, 0.4)';
                ctx.font = 'bold 12px Plus Jakarta Sans';
                ctx.textAlign = 'center';
                
                // Text in top pillar
                ctx.fillText(p.label, p.x + PIPE_WIDTH/2, p.topHeight - 20);
                // Text in bottom pillar
                ctx.fillText(p.label, p.x + PIPE_WIDTH/2, bottomY + 30);
                ctx.restore();

                // Collision
                const birdCX = bird.x + bird.radius;
                const birdCY = bird.y + bird.radius;
                const testXTop = Math.max(p.x, Math.min(birdCX, p.x + PIPE_WIDTH));
                const testYTop = Math.max(0, Math.min(birdCY, p.topHeight));
                const testYBot = Math.max(bottomY, Math.min(birdCY, bottomY + bottomHeight));
                
                if (Math.hypot(birdCX - testXTop, birdCY - testYTop) < bird.radius - 2 || 
                    Math.hypot(birdCX - testXTop, birdCY - testYBot) < bird.radius - 2) gameOver();

                if (!p.passed && p.x + PIPE_WIDTH < bird.x) { score++; scoreEl.innerText = score; p.passed = true; }
                if (p.x + PIPE_WIDTH < 0) pipes.splice(index, 1);
            });

            frame++;
            requestAnimationFrame(animate);
        }

        function gameOver() {
            gameActive = false; overlay.style.display = 'flex';
            statusText.innerText = "SPRINT HALTED";
            if (score > highScore) { highScore = score; highScoreEl.innerText = highScore; }
        }
        lucide.createIcons();
    </script>
</body>
</html>
